# ============================================================
# deploy.yml — Pipeline CI/CD Éther Studio
# ============================================================
# Déclenché à chaque git push sur "main".
#
# Étapes :
#   1. Build les 3 images Docker (backend, frontend, nginx)
#   2. Push sur Docker Hub
#   3. Se connecte au VPS en SSH et redémarre l'app
#   4. Vérifie que l'app répond correctement
#
# Secrets GitHub requis (Settings → Secrets → Actions) :
#   DOCKERHUB_USERNAME  — ton username Docker Hub
#   DOCKERHUB_TOKEN     — token Docker Hub (Account Settings → Security)
#   VPS_HOST            — IP ou domaine du VPS
#   VPS_USER            — utilisateur SSH (root)
#   VPS_SSH_KEY         — clé privée SSH complète (-----BEGIN OPENSSH...)
#   APP_URL             — https://TON_DOMAINE.com
# ============================================================

name: 🚀 Deploy Éther Studio

on:
  push:
    branches: [main]
  # Permet de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 — Build et push les images Docker
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: 🔨 Build & Push
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Connexion à Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Activer BuildKit multi-plateforme + cache
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build + Push — Backend Node.js/Express
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # 5. Build + Push — Frontend Next.js
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # 6. Build + Push — Nginx
      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/studio-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 2 — Déployer sur le VPS
  # Attend que le Job 1 soit terminé avec succès
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # 1. SSH dans le VPS et lancer le déploiement
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/studio-ia

            echo "▸ Pull nouvelles images..."
            docker compose pull

            echo "▸ Redémarrage des services..."
            docker compose up -d --remove-orphans

            echo "▸ Nettoyage..."
            docker image prune -f

            echo "✅ Déployé le $(date '+%d/%m/%Y %H:%M:%S')"
            docker compose ps

      # 2. Vérifier que l'app répond (health check)
      - name: Health check
        run: |
          echo "Attente du démarrage des conteneurs (20s)..."
          sleep 20
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 15 "${{ secrets.APP_URL }}" || echo "000")
          echo "HTTP Status: $STATUS"
          if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
            echo "✅ App en ligne !"
          else
            echo "⚠️  L'app retourne le status $STATUS — vérifie les logs VPS."
            echo "    ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \"docker compose logs --tail=50\""
            # Ne bloque pas le pipeline si l'app est lente à démarrer
            exit 0
          fi

  # ──────────────────────────────────────────────────────────
  # JOB 3 — Résumé du déploiement (notification dans Actions)
  # ──────────────────────────────────────────────────────────
  summary:
    name: 📋 Résumé
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Résumé du pipeline
        run: |
          echo "## 🎛 Éther Studio — Déploiement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Élément | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Déclenché par | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ secrets.APP_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result == 'success' && '✅ Succès' || '❌ Échec' }} |" >> $GITHUB_STEP_SUMMARY
