# ============================================================
# Éther — Nginx Reverse Proxy
# Remplacer TON_DOMAINE.com par ton vrai domaine avant le build.
# ============================================================

events {
  worker_connections 1024;
}

http {
  # ── Types MIME ─────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logs ───────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────────────────────
  sendfile           on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json application/javascript
                     text/xml application/xml text/javascript;
  client_max_body_size 30M;

  # ── Upstream services ──────────────────────────────────────
  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:4000;
  }

  # ── Redirect HTTP → HTTPS ──────────────────────────────────
  server {
    listen 80;
    server_name TON_DOMAINE.com www.TON_DOMAINE.com;

    # Certbot renouvellement SSL (challenge ACME)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS principal ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name TON_DOMAINE.com www.TON_DOMAINE.com;

    # Certificats SSL (générés par Certbot)
    ssl_certificate     /etc/letsencrypt/live/TON_DOMAINE.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TON_DOMAINE.com/privkey.pem;

    # Paramètres SSL sécurisés
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Routes API → backend Express ───────────────────────
    location /api/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Timeout étendu pour MusicGen (~45s)
      proxy_read_timeout    120s;
      proxy_connect_timeout 10s;
      proxy_send_timeout    120s;

      # Upload audio (25 Mo max)
      client_max_body_size 30M;
    }

    # ── Tout le reste → Next.js frontend ───────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── Assets Next.js — cache long ────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }
}
